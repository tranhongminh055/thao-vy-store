<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo Admin Account - ThaoVyStore</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NCRC91XW3F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NCRC91XW3F');
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 450px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      text-align: center;
      color: #667eea;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #999;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      margin-top: 20px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      display: none;
      font-size: 14px;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .message.loading {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }

    .presets {
      background: #f9f9f9;
      border: 1px solid #eee;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .presets p {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .preset-btn {
      width: 100%;
      padding: 8px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-bottom: 8px;
      transition: all 0.2s;
    }

    .preset-btn:hover {
      background: #f0f0f0;
      border-color: #667eea;
    }

    .preset-btn:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🔐 Tạo Admin Account</h1>
  <p class="subtitle">Thiết lập tài khoản quản trị viên cho ThaoVyStore</p>

  <div class="presets">
    <p>🚀 Sử dụng nhanh:</p>
    <button class="preset-btn" onclick="setPreset('vynguyen2005@gmail.com', '123456', 'Admin VyNguyen')">
      📧 vynguyen2005@gmail.com / 🔑 123456
    </button>
  </div>

  <form id="adminForm">
    <div class="form-group">
      <label for="email">📧 Email Admin</label>
      <input type="email" id="email" name="email" required value="vynguyen2005@gmail.com">
    </div>

    <div class="form-group">
      <label for="password">🔑 Mật Khẩu</label>
      <input type="password" id="password" name="password" required value="123456">
    </div>

    <div class="form-group">
      <label for="name">👤 Tên Quản Trị</label>
      <input type="text" id="name" name="name" required value="Admin VyNguyen">
    </div>

    <div class="form-group">
      <label for="secretKey">🔓 Secret Key</label>
      <input type="password" id="secretKey" name="secretKey" required value="vy2005admin" placeholder="Secret key">
      <small style="color: #999; font-size: 12px;">Nhập: vy2005admin</small>
    </div>

    <button type="submit">✅ Tạo Admin Account</button>
  </form>

  <div id="message" class="message"></div>
</div>

<script>
  const form = document.getElementById('adminForm');
  const messageEl = document.getElementById('message');

  function setPreset(email, password, name) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = password;
    document.getElementById('name').value = name;
    document.getElementById('secretKey').value = 'vy2005admin';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const name = document.getElementById('name').value.trim();
    const secretKey = document.getElementById('secretKey').value;

    if (!email || !password || !name || !secretKey) {
      showMessage('❌ Vui lòng điền đầy đủ thông tin', 'error');
      return;
    }

    showMessage('⏳ Đang tạo admin account...', 'loading');

    try {
      const response = await fetch(
        'https://us-central1-thao-vy-store.cloudfunctions.net/createAdminQuick',
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, name, secretKey })
        }
      );

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || 'Lỗi không xác định');
      }

      showMessage(
        `✅ Thành công!\n📧 ${email}\n🔑 ${password}\n👤 ${name}\n\nBây giờ truy cập login.html để đăng nhập`,
        'success'
      );

      // Redirect sau 3 giây
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 3000);

    } catch (error) {
      showMessage('❌ Lỗi: ' + error.message, 'error');
    }
  });

  function showMessage(text, type) {
    messageEl.innerHTML = text.replace(/\n/g, '<br>');
    messageEl.className = 'message ' + type;
  }
</script>
</body>
</html>
