<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhập Xuất Hàng Hóa - Thao Vy Store</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NCRC91XW3F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NCRC91XW3F');
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      padding: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 20px;
    }

    .header h1 {
      color: #667eea;
      font-size: 28px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      background: #667eea;
      color: white;
    }

    button:hover {
      background: #764ba2;
      transform: translateY(-2px);
    }

    button.secondary {
      background: #6c757d;
    }

    button.secondary:hover {
      background: #5a6268;
    }

    button.success {
      background: #28a745;
    }

    button.success:hover {
      background: #218838;
    }

    button.danger {
      background: #dc3545;
    }

    button.danger:hover {
      background: #c82333;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .stat-card h3 {
      font-size: 14px;
      font-weight: normal;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: bold;
    }

    .filters {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filters input,
    .filters select {
      padding: 10px 15px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }

    .filters input:focus,
    .filters select:focus {
      outline: none;
      border-color: #667eea;
    }

    .table-container {
      overflow-x: auto;
      border-radius: 5px;
      border: 2px solid #ddd;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    thead {
      background: #667eea;
      color: white;
    }

    th {
      padding: 15px;
      text-align: left;
      font-weight: bold;
      border-right: 1px solid #555;
    }

    th:last-child {
      border-right: none;
    }

    td {
      padding: 12px 15px;
      border-bottom: 1px solid #ddd;
    }

    tbody tr:hover {
      background: #f5f5f5;
    }

    tbody tr:nth-child(even) {
      background: #f9f9f9;
    }

    .status {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .status.confirmed {
      background: #d4edda;
      color: #155724;
    }

    .status.pending {
      background: #fff3cd;
      color: #856404;
    }

    .status.delivered {
      background: #d1ecf1;
      color: #0c5460;
    }

    .status.cancelled {
      background: #f8d7da;
      color: #721c24;
    }

    .price {
      color: #28a745;
      font-weight: bold;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      border: 1px solid #f5c6cb;
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      border: 1px solid #c3e6cb;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .pagination button {
      padding: 8px 12px;
      min-width: 40px;
    }

    .pagination button.active {
      background: #764ba2;
    }

    .pagination button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .order-details {
      margin-top: 10px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      font-size: 12px;
      display: none;
    }

    .order-details.expanded {
      display: block;
    }

    .products-list {
      margin-top: 10px;
    }

    .product-item {
      background: white;
      padding: 8px;
      margin: 5px 0;
      border-radius: 3px;
      border-left: 3px solid #667eea;
    }

    .no-data {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    @media (max-width: 768px) {
      .container {
        padding: 15px;
      }

      .header {
        flex-direction: column;
        gap: 15px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 8px;
      }

      .filters {
        flex-direction: column;
      }

      .filters input,
      .filters select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>� Nhập Xuất Hàng Hóa</h1>
    <div class="header-actions">
      <button onclick="fetchAllOrders()" class="success">🔄 Làm Mới Dữ Liệu</button>
      <button onclick="exportCSV()" class="secondary">📥 Xuất CSV</button>
      <button onclick="exportJSON()" class="secondary">📥 Xuất JSON</button>
      <button onclick="window.location.href='admin.html'" class="secondary">⬅️ Quay Lại</button>
    </div>
  </div>

  <div id="messageArea"></div>

  <div id="statsArea" style="display: none;">
    <div class="stats" id="statsContainer"></div>
  </div>

  <div class="filters">
    <input type="text" id="searchInput" placeholder="Tìm kiếm theo email, tên, hoặc ID đơn hàng...">
    <select id="statusFilter" onchange="applyFilters()">
      <option value="">Tất cả trạng thái</option>
      <option value="confirmed">Confirmed</option>
      <option value="pending">Pending</option>
      <option value="delivered">Delivered</option>
      <option value="cancelled">Cancelled</option>
    </select>
  </div>

  <div id="contentArea">
    <div class="loading">
      <div class="spinner"></div>
      <p>Đang tải dữ liệu...</p>
    </div>
  </div>
</div>

<script src="firebaseInit.js"></script>
<script src="firebase-config.js"></script>
<script src="get-all-orders.js"></script>
<script>
  let allOrdersData = null;
  let filteredOrders = [];

  // Initialize
  document.addEventListener('DOMContentLoaded', async () => {
    initializeFirebase();
    await fetchAllOrders();
  });

  async function fetchAllOrders() {
    const messageArea = document.getElementById('messageArea');
    const contentArea = document.getElementById('contentArea');
    const statsArea = document.getElementById('statsArea');

    messageArea.innerHTML = '';
    contentArea.innerHTML = '<div class="loading"><div class="spinner"></div><p>Đang tải dữ liệu...</p></div>';
    statsArea.style.display = 'none';

    try {
      const result = await window.getAllOrders.fetch();

      if (!result || !result.orders) {
        throw new Error('Không thể lấy dữ liệu đơn hàng');
      }

      allOrdersData = result;
      filteredOrders = JSON.parse(JSON.stringify(result.orders));

      // Show stats
      displayStats(result.stats);

      // Show orders table
      displayOrdersTable(filteredOrders);

      messageArea.innerHTML = `<div class="success-message">✅ Tải dữ liệu thành công! Tổng ${result.stats.totalOrders} đơn hàng</div>`;

    } catch (error) {
      console.error('Error:', error);
      messageArea.innerHTML = `<div class="error">❌ Lỗi: ${error.message}</div>`;
      contentArea.innerHTML = '<div class="no-data">Vui lòng thử lại sau hoặc liên hệ quản trị viên</div>';
    }
  }

  function displayStats(stats) {
    const statsContainer = document.getElementById('statsContainer');
    const statsArea = document.getElementById('statsArea');

    statsContainer.innerHTML = `
      <div class="stat-card">
        <h3>Tổng Đơn Hàng</h3>
        <div class="value">${stats.totalOrders}</div>
      </div>
      <div class="stat-card">
        <h3>Tổng Doanh Thu</h3>
        <div class="value">${formatVND(stats.totalRevenue)}</div>
      </div>
      <div class="stat-card">
        <h3>Doanh Thu Trung Bình</h3>
        <div class="value">${formatVND(stats.totalRevenue / (stats.totalOrders || 1))}</div>
      </div>
      <div class="stat-card">
        <h3>Tổng Người Mua</h3>
        <div class="value">${Object.keys(stats.ordersByUser).length}</div>
      </div>
    `;

    statsArea.style.display = 'grid';
  }

  function displayOrdersTable(orders) {
    const contentArea = document.getElementById('contentArea');

    if (orders.length === 0) {
      contentArea.innerHTML = '<div class="no-data">Không có dữ liệu đơn hàng</div>';
      return;
    }

    let tableHTML = `
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Mã Đơn</th>
              <th>Email Khách</th>
              <th>Tên Khách</th>
              <th>Trạng Thái</th>
              <th>Tổng Tiền</th>
              <th>Ngày Đặt</th>
              <th>Hành Động</th>
            </tr>
          </thead>
          <tbody>
    `;

    orders.forEach(order => {
      const status = order.status || 'pending';
      const statusClass = status.toLowerCase();
      const orderDate = order.orderDate || formatDate(order.createdAt);
      const customerName = order.customer?.name || order.name || 'N/A';
      const customerEmail = order.userEmail || order.email || 'N/A';

      tableHTML += `
        <tr>
          <td><strong>${order.orderId || order.id || 'N/A'}</strong></td>
          <td>${customerEmail}</td>
          <td>${customerName}</td>
          <td><span class="status ${statusClass}">${status}</span></td>
          <td><span class="price">${formatVND(order.total || 0)}</span></td>
          <td>${orderDate}</td>
          <td><button onclick="toggleOrderDetails('${order.orderId || order.id}')">Chi Tiết</button></td>
        </tr>
        <tr id="details-${order.orderId || order.id}" style="display:none;">
          <td colspan="7">
            <div class="order-details expanded">
              <strong>Địa chỉ giao hàng:</strong> ${order.customer?.address || order.address || 'N/A'}<br>
              <strong>Số điện thoại:</strong> ${order.customer?.phone || order.phone || 'N/A'}<br>
              <strong>Phương thức thanh toán:</strong> ${order.payment || 'N/A'}<br>
              <strong>Hình thức giao hàng:</strong> ${order.delivery || 'N/A'}<br>
              <strong>Subtotal:</strong> ${formatVND(order.subtotal || 0)}<br>
              <div class="products-list">
                <strong>Sản phẩm:</strong>
                ${(order.products || order.items || []).map(p => `
                  <div class="product-item">
                    ${p.name || 'N/A'} x${p.quantity || 1} = ${formatVND((p.price || 0) * (p.quantity || 1))}
                  </div>
                `).join('')}
              </div>
            </div>
          </td>
        </tr>
      `;
    });

    tableHTML += `
          </tbody>
        </table>
      </div>
    `;

    contentArea.innerHTML = tableHTML;
  }
// Toggle hiển thị chi tiết đơn hàng
  function toggleOrderDetails(orderId) {
    const detailsRow = document.getElementById(`details-${orderId}`);
    if (detailsRow) {
      detailsRow.style.display = detailsRow.style.display === 'none' ? 'table-row' : 'none';
    }
  }
// Áp dụng bộ lọc tìm kiếm và trạng thái
  function applyFilters() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const statusFilter = document.getElementById('statusFilter').value;

    filteredOrders = allOrdersData.orders.filter(order => {
      const matchesSearch = !searchTerm || 
        (order.orderId || order.id || '').toLowerCase().includes(searchTerm) ||
        (order.userEmail || order.email || '').toLowerCase().includes(searchTerm) ||
        (order.customer?.name || order.name || '').toLowerCase().includes(searchTerm);

      const matchesStatus = !statusFilter || (order.status || 'pending') === statusFilter;

      return matchesSearch && matchesStatus;
    });

    displayOrdersTable(filteredOrders);
  }
// Gắn sự kiện cho input tìm kiếm
  document.getElementById('searchInput').addEventListener('keyup', applyFilters);

  function exportCSV() {
    if (!allOrdersData || !allOrdersData.orders.length) {
      alert('Không có dữ liệu để xuất');
      return;
    }
    window.getAllOrders.exportCSV(filteredOrders || allOrdersData.orders);
    alert('✅ Xuất CSV thành công!');
  }

  function exportJSON() {
    if (!allOrdersData) {
      alert('Không có dữ liệu để xuất');
      return;
    }
    window.getAllOrders.exportJSON(allOrdersData);
    alert('✅ Xuất JSON thành công!');
  }
// Hàm định dạng tiền tệ VND
  function formatVND(amount) {
    return new Intl.NumberFormat('vi-VN', {
      style: 'currency',
      currency: 'VND' 
    }).format(amount);
  }
// Hàm định dạng ngày tháng
  function formatDate(dateString) {
    if (!dateString) return 'N/A';
    try {
      return new Date(dateString).toLocaleDateString('vi-VN');
    } catch {
      return dateString;
    }
  }
</script>
</body>
</html>
